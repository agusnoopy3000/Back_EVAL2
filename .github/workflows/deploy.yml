name: CI/CD Backend -> Docker Hub -> EC2

on:
  push:
    branches: [deploy]
  workflow_dispatch:

jobs:
  build-push-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout codigo
        uses: actions/checkout@v4

      - name: Login en Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build y push imagen backend
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/back-eval2:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/back-eval2:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy en EC2-Backend via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd ~/app
            curl -fsSL https://raw.githubusercontent.com/${{ github.repository }}/deploy/docker-compose.yml -o docker-compose.yml
            mkdir -p initdb
            curl -fsSL https://raw.githubusercontent.com/${{ github.repository }}/deploy/initdb/01_creacion_base_datos.sql -o initdb/01_creacion_base_datos.sql
            curl -fsSL https://raw.githubusercontent.com/${{ github.repository }}/deploy/initdb/02_backup_y_mantenimiento.sql -o initdb/02_backup_y_mantenimiento.sql
            docker compose pull backend
            docker compose up -d
            docker image prune -f
            docker ps
